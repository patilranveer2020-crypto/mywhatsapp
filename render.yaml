services:
  - type: web
    name: mywhatsapp
    env: python
    buildCommand: "./build.sh"
    startCommand: "daphne -b 0.0.0.0 -p $PORT mywhatsapp.asgi:application"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: mywhatsapp-db
          property: connectionString
      - key: CLOUDINARY_CLOUD_NAME
        value: your_cloudinary_cloud_name
      - key: CLOUDINARY_API_KEY
        value: your_cloudinary_api_key
      - key: CLOUDINARY_API_SECRET
        value: your_cloudinary_api_secret
      - key: VAPID_PRIVATE_KEY
        value: your_vapid_private_key
      - key: ALLOWED_HOSTS
        value: your_domain.onrender.com

databases:
  - name: mywhatsapp-db
    databaseName: mywhatsapp
    user: mywhatsapp
    plan: free
