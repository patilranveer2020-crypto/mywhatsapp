<!DOCTYPE html>
<html>
<head>
    <title>Video Call</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        #video-container {
            display: flex;
            position: relative;
        }
        #local-video {
            width: 200px;
            height: 150px;
            position: absolute;
            top: 10px;
            right: 10px;
            border: 1px solid #ccc;
        }
        #remote-video {
            width: 800px;
            height: 600px;
            border: 1px solid #ccc;
        }
        #call-controls {
            margin-top: 20px;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
</head>
<script>
        // BREADCRUMB 1
        alert("1. Script has started!");

        const is_caller = "{{ is_caller|safe }}";
        const room_id = "{{ room_id }}";
        
        // BREADCRUMB 2
        alert("2. Variables loaded. is_caller = " + is_caller);

        const wsScheme = window.location.protocol === "https:" ? "wss" : "ws";
        const socket = new WebSocket(`${wsScheme}://${window.location.host}/ws/videocall/${room_id}/`);

        // BREADCRUMB 3
        alert("3. Trying to connect to server...");

        socket.onopen = async () => {
            // BREADCRUMB 4
            alert("4. WebSocket Connected to Server!");
            
            try {
                let localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                document.getElementById('local-video').srcObject = localStream;
                
                // BREADCRUMB 5
                alert("5. Camera is ON! Sending Ready signal...");
                
                if (!is_caller) {
                    socket.send(JSON.stringify({ 'type': 'peer_ready' }));
                }
            } catch (error) {
                alert("CAMERA DENIED: " + error.message);
            }
        };
    </script>
</body>
</html>
