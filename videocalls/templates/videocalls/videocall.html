<!DOCTYPE html>
<html>
<head>
    <title>Video Call</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        #video-container {
            display: flex;
            position: relative;
        }
        #local-video {
            width: 200px;
            height: 150px;
            position: absolute;
            top: 10px;
            right: 10px;
            border: 1px solid #ccc;
        }
        #remote-video {
            width: 800px;
            height: 600px;
            border: 1px solid #ccc;
        }
        #call-controls {
            margin-top: 20px;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
</head>
   <video id="local-video" autoplay playsinline muted style="width: 100%; max-width: 400px;"></video>

   <video id="remote-video" autoplay playsinline style="width: 100%; max-width: 400px;"></video>
<script>
        const is_caller = "{{ is_caller|safe }}";
        const room_id = "{{ room_id }}";
        
        let localStream;
        let peerConnection;
        
        const wsScheme = window.location.protocol === "https:" ? "wss" : "ws";
        const socket = new WebSocket(`${wsScheme}://${window.location.host}/ws/videocall/${room_id}/`);

        const localVideo = document.getElementById('local-video');
        const remoteVideo = document.getElementById('remote-video');

        const servers = {
            iceServers: [
                { urls: ['stun:stun1.l.google.com:19302', 'stun:stun2.l.google.com:19302'] }
            ]
        };

        socket.onopen = async () => {
            try {
                // Turn on the camera automatically
                localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                localVideo.srcObject = localStream;
                
                // 👉 NEW: EVERYONE announces when they enter the room
                socket.send(JSON.stringify({ 'type': 'peer_ready' }));
            } catch (error) {
                console.error("Camera access denied: ", error);
            }
        };

        socket.onmessage = async (event) => {
            const data = JSON.parse(event.data);
            
            switch(data.type) {
                case 'peer_ready':
                    if (is_caller && !peerConnection) {
                        // Caller hears the friend and starts the video stream!
                        initiateCall();
                    } else if (!is_caller) {
                        // 👉 NEW: Friend hears the caller arrive, and echoes back "I am here too!"
                        socket.send(JSON.stringify({ 'type': 'peer_ready' }));
                    }
                    break;
                case 'webrtc_offer':
                    await handleOffer(data.offer);
                    break;
                case 'webrtc_answer':
                    await handleAnswer(data.answer);
                    break;
                case 'webrtc_ice_candidate':
                    await handleIceCandidate(data.candidate);
                    break;
                case 'call_end':
                    window.location.href = '/';
                    break;
            }
        };

        const initiateCall = async () => {
            peerConnection = new RTCPeerConnection(servers);
            localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));

            peerConnection.onicecandidate = event => {
                if (event.candidate) {
                    socket.send(JSON.stringify({ 'type': 'webrtc_ice_candidate', 'candidate': event.candidate }));
                }
            };

            peerConnection.ontrack = event => {
                remoteVideo.srcObject = event.streams[0];
            };

            const offer = await peerConnection.createOffer();
            await peerConnection.setLocalDescription(offer);
            socket.send(JSON.stringify({ 'type': 'webrtc_offer', 'offer': offer }));
        };

        const handleOffer = async (offer) => {
            peerConnection = new RTCPeerConnection(servers);
            localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));

            peerConnection.onicecandidate = event => {
                if (event.candidate) {
                    socket.send(JSON.stringify({ 'type': 'webrtc_ice_candidate', 'candidate': event.candidate }));
                }
            };

            peerConnection.ontrack = event => {
                remoteVideo.srcObject = event.streams[0];
            };

            await peerConnection.setRemoteDescription(new RTCSessionDescription(offer));
            const answer = await peerConnection.createAnswer();
            await peerConnection.setLocalDescription(answer);
            socket.send(JSON.stringify({ 'type': 'webrtc_answer', 'answer': answer }));
        };

        const handleAnswer = async (answer) => {
            await peerConnection.setRemoteDescription(new RTCSessionDescription(answer));
        };

        const handleIceCandidate = async (candidate) => {
            try { await peerConnection.addIceCandidate(candidate); } catch(e) {}
        };

        const hangupBtn = document.getElementById('hangup-btn');
        if (hangupBtn) {
            hangupBtn.addEventListener('click', () => {
                socket.send(JSON.stringify({ 'type': 'call_end' }));
                window.location.href = '/';
            });
        }
    </script>
</body>
</html>
