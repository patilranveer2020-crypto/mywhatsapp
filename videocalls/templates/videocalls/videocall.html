<!DOCTYPE html>
<html>
<head>
    <title>Video Call</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        #video-container {
            display: flex;
            position: relative;
        }
        #local-video {
            width: 200px;
            height: 150px;
            position: absolute;
            top: 10px;
            right: 10px;
            border: 1px solid #ccc;
        }
        #remote-video {
            width: 800px;
            height: 600px;
            border: 1px solid #ccc;
        }
        #call-controls {
            margin-top: 20px;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h1>Video Call</h1>
    <div id="video-container">
        <video id="local-video" autoplay muted></video>
        <video id="remote-video" autoplay></video>
    </div>
    <div id="call-controls">
        <button id="mute-btn">Mute</button>
        <button id="hangup-btn">Hang Up</button>
    </div>

    <script>
       // 1. Fixed the boolean trap so only ONE person initiates the call
        const is_caller = "{{ is_caller|safe }}";
        const room_id = "{{ room_id }}";
        const user_id = "{{ user.id }}";
        
        let localStream;
        let remoteStream;
        let peerConnection;
        
        const wsScheme = window.location.protocol === "https:" ? "wss" : "ws";
        const socket = new WebSocket(`${wsScheme}://${window.location.host}/ws/videocall/${room_id}/`);

        const localVideo = document.getElementById('local-video');
        const remoteVideo = document.getElementById('remote-video');
        const muteBtn = document.getElementById('mute-btn');
        const hangupBtn = document.getElementById('hangup-btn');

        const servers = {
            iceServers: [
                { urls: ['stun:stun1.l.google.com:19302', 'stun:stun2.l.google.com:19302'] }
            ]
        };

        // 1. Get the camera first, THEN start talking to the server
        // 1. Get the camera first, THEN start talking to the server
        socket.onopen = async () => {
            console.log("WebSocket connected. Room ID:", room_id);
            console.log("Am I the caller?", is_caller);
            
            try {
                console.log("Requesting camera access...");
                localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                localVideo.srcObject = localStream;
                console.log("Camera acquired successfully!");
            } catch (error) {
                console.error("Camera error:", error);
                alert("Camera access denied! Call cannot continue.");
                return;
            }

            if (!is_caller) {
                console.log("I am the friend. Sending 'peer_ready' to the server...");
                socket.send(JSON.stringify({ 'type': 'peer_ready' }));
            } else {
                console.log("I am the caller. Waiting for friend to send 'peer_ready'...");
            }
        };

        socket.onmessage = async (event) => {
            const data = JSON.parse(event.data);
            console.log("Received WebRTC Signal: ", data.type);

            switch(data.type) {
                case 'peer_ready':
                    // 👉 Caller hears the friend is ready, and starts the handshake!
                    if (is_caller) initiateCall();
                    break;
                case 'webrtc_offer':
                    await handleOffer(data.offer);
                    break;
                case 'webrtc_answer':
                    await handleAnswer(data.answer);
                    break;
                case 'webrtc_ice_candidate':
                    await handleIceCandidate(data.candidate);
                    break;
                case 'call_end':
                    endCall();
                    break;
            }
        };

        const initiateCall = async () => {
            peerConnection = new RTCPeerConnection(servers);
            
            // We already have the camera, just add the tracks!
            localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));

            peerConnection.onicecandidate = event => {
                if (event.candidate) {
                    socket.send(JSON.stringify({
                        'type': 'webrtc_ice_candidate',
                        'candidate': event.candidate
                    }));
                }
            };

            peerConnection.ontrack = event => {
                remoteVideo.srcObject = event.streams[0];
            };

            const offer = await peerConnection.createOffer();
            await peerConnection.setLocalDescription(offer);

            socket.send(JSON.stringify({
                'type': 'webrtc_offer',
                'offer': offer
            }));
        };

        const handleOffer = async (offer) => {
            peerConnection = new RTCPeerConnection(servers);
            localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));

            peerConnection.onicecandidate = event => {
                if (event.candidate) {
                    socket.send(JSON.stringify({
                        'type': 'webrtc_ice_candidate',
                        'candidate': event.candidate
                    }));
                }
            };

            peerConnection.ontrack = event => {
                remoteVideo.srcObject = event.streams[0];
            };

            await peerConnection.setRemoteDescription(new RTCSessionDescription(offer));
            const answer = await peerConnection.createAnswer();
            await peerConnection.setLocalDescription(answer);

            socket.send(JSON.stringify({
                'type': 'webrtc_answer',
                'answer': answer
            }));
        };

        const handleAnswer = async (answer) => {
            await peerConnection.setRemoteDescription(new RTCSessionDescription(answer));
        };

        const handleIceCandidate = async (candidate) => {
            try {
                await peerConnection.addIceCandidate(candidate);
            } catch(e) {
                console.log("ICE Error", e);
            }
        };

        const endCall = () => {
            if (peerConnection) peerConnection.close();
            if (localStream) localStream.getTracks().forEach(track => track.stop());
            window.location.href = '/'; 
        };

        hangupBtn.addEventListener('click', () => {
            socket.send(JSON.stringify({ 'type': 'call_end' }));
            endCall();
        });

        muteBtn.addEventListener('click', () => {
            const audioTrack = localStream.getAudioTracks()[0];
            audioTrack.enabled = !audioTrack.enabled;
            muteBtn.textContent = audioTrack.enabled ? 'Mute' : 'Unmute';
        });

    </script>
</body>
</html>
